<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
	<title>Consent</title>
	<style>
		* { box-sizing: border-box; }
		:root,
		input,
		button,
		textarea,
		select { font-size: 12pt; font-family: sans-serif; }
		:root {
			color: #24192e;
			background: #f7f1fb;
			accent-color: #7521b0;
		}
		body { margin: 0; background: linear-gradient(180deg, #fbf8fe 0%, #f4ecfb 100%); }
		a { color: #7521b0; text-underline-offset: 0.18em; }
		header { color: white; background-color: #7521b0; padding: 1.25rem 1rem; text-align: center; box-shadow: 0 1px 0 #5f1b8e; }
		header h1 { margin: 0; font-size: 1.15rem; font-weight: 700; letter-spacing: 0.02em; }
		main { width: auto; margin: 0 auto; padding: 1.25rem; max-width: 44rem; }
		section { margin: 0; }
		h2 { margin: 0 0 0.4rem; color: #7521b0; font-size: 1.5rem; }
		p { line-height: 1.5; }
		p:first-child { margin-block-start: 0; }
		p:last-child { margin-block-end: 0; }
		ul { margin: 0; }
		.page {
			margin: 2rem auto;
			padding: 1.5rem;
			background: rgba(255, 255, 255, 0.88);
			border: 1px solid #ddc9ef;
			border-radius: 0.9rem;
			box-shadow: 0 16px 40px rgba(80, 32, 112, 0.08);
		}
		.eyebrow {
			margin: 0 0 0.6rem;
			color: #75548d;
			font-size: 0.92rem;
			text-transform: uppercase;
			letter-spacing: 0.08em;
		}
		.notice {
			margin: 1rem 0;
			padding: 0.85rem 1rem;
			border-radius: 0.75rem;
			border: 1px solid #e9d8f7;
			background: #fbf7fe;
		}
		.notice.error {
			border-color: #d08ab3;
			background: #fff5f9;
			color: #7a1c4c;
		}
		.stack > * + * { margin-top: 1rem; }
		.actions { display: flex; gap: 0.75rem; flex-wrap: wrap; margin-top: 1.5rem; }
		.button,
		button {
			display: inline-flex;
			align-items: center;
			justify-content: center;
			padding: 0.8rem 1.1rem;
			border: 1px solid #7521b0;
			border-radius: 0.75rem;
			background: white;
			color: #7521b0;
			font-weight: 600;
			text-decoration: none;
			cursor: pointer;
		}
		.button.primary,
		button.primary {
			background: #7521b0;
			color: white;
		}
		.button:hover,
		button:hover { background: #f7effd; }
		.button.primary:hover,
		button.primary:hover { background: #652097; }
		input[type="text"],
		input[type="password"] {
			width: 100%;
			padding: 0.8rem 0.9rem;
			border: 1px solid #c9afd9;
			border-radius: 0.75rem;
			background: white;
			color: inherit;
		}
		input[type="text"]:focus,
		input[type="password"]:focus,
		button:focus,
		.button:focus {
			outline: 2px solid #b98bdb;
			outline-offset: 2px;
		}
		label { display: block; font-weight: 600; margin-bottom: 0.4rem; }
		footer { text-align: center; padding: 0 1rem 1.5rem; color: #75548d; }
		.copyleft { display:inline-block;transform: scaleX(-1); }
		{{- template "style" .}}
		@media screen and (min-width: 480px) {
			main { padding: 1.5rem; }
		}
	</style>
</head>
<body>
	<header>
		<h1>Pollinator Network</h1>
	</header>
	<main>
		{{- template "content" . -}}
	</main>
	<footer>
		<span class="copyleft">(c)</span> ∞ Human Kind
	</footer>
</body>
</html>
